# Joint Training Configuration — Vehicle Detection + Lane Segmentation
# Used by: 08_joint_training.ipynb

# ── Paths ──────────────────────────────────────────────────────────────────
ecocar_root: /content/drive/MyDrive/EcoCAR
dataset_root: /content/bdd100k_yolo

# Dataset directories (relative to dataset_root)
train_images: images/train
train_labels: labels/train
train_masks: masks/train
val_images: images/val
val_labels: labels/val
val_masks: masks/val

# ── Detection classes (vehicle-only) ─────────────────────────────────────
nc: 5
names:
  0: car
  1: truck
  2: bus
  3: motorcycle
  4: bicycle

# ── Model ─────────────────────────────────────────────────────────────────
pretrained_weights: yolo26s.pt
mask_height: 160
mask_width: 160

lane_head:
  type: transformer
  embed_dim: 128
  num_heads: 4
  depth: 2

# ── Training ──────────────────────────────────────────────────────────────
epochs: 30
batch_size: 16
img_size: 640
lr: 0.002
weight_decay: 0.0005

# Loss weights
det_loss_weight: 1.0
lane_loss_weight: 0.3

# ── Performance ───────────────────────────────────────────────────────────
amp: true
num_workers: 4
save_period: 5

# ── Output ────────────────────────────────────────────────────────────────
save_dir: /content/drive/MyDrive/EcoCAR/training_runs/vehicle_lane_v4
