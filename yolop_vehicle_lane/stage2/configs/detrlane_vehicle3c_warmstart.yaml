# ══════════════════════════════════════════════════════════════════════
#  Stage2 branch — 3-class DETR-lane (vehicle + motorcycle + bicycle)
#                  + WARM-START from stage1 best-row
# ══════════════════════════════════════════════════════════════════════
# Warm-start is a class-remapped copy: stage1's single 'vehicle' row
# is copied into student class 0; motorcycle (1) and bicycle (2) rows
# are left at student init. box + obj rows copy verbatim.

GPUS: (0,)
WORKERS: 8
PIN_MEMORY: true
PRINT_FREQ: 20
AUTO_RESUME: true
NEED_AUTOANCHOR: false
DEBUG: false

CUDNN: {BENCHMARK: true, DETERMINISTIC: false, ENABLED: true}

DRIVE:
  ROOT: '/content/drive/MyDrive/EcoCAR'
  CHECKPOINT_DIR: '/content/drive/MyDrive/EcoCAR/yolop_vehicle_lane/stage2/checkpoints/detrlane_vehicle3c_warmstart'
  METRICS_DIR:    '/content/drive/MyDrive/EcoCAR/yolop_vehicle_lane/stage2/metrics/detrlane_vehicle3c_warmstart'

MODEL:
  NAME: 'YOLOPv2-DETRLane'
  NC: 3
  VEHICLE_CLASSES: ['vehicle', 'motorcycle', 'bicycle']
  PRETRAINED: ''
  IMAGE_SIZE: [640, 640]

STAGE2:
  WARM_START: true
  WARM_START_CKPT: '/content/drive/MyDrive/EcoCAR/yolop_vehicle_lane/stage1/checkpoints/yolopv2_best_row/best.pth'
  WARM_START_TEACHER_NC: 1
  DISTILL: false
  DISTILL_CKPT: ''
  DISTILL_BOX_WEIGHT: 1.0
  DISTILL_OBJ_WEIGHT: 1.0
  DISTILL_VEHICLE_CLS_WEIGHT: 1.0
  GRAD_BALANCE: 'none'            # none | uncertainty | pcgrad

LOSS:
  BOX_GAIN: 0.05
  CLS_GAIN: 0.5
  OBJ_GAIN: 1.0
  CLS_POS_WEIGHT: 1.0
  OBJ_POS_WEIGHT: 1.0
  SEG_POS_WEIGHT: 1.0
  LL_SEG_GAIN: 1.0
  LL_IOU_GAIN: 0.2
  FL_GAMMA: 1.5
  LL_FL_GAMMA: 1.5
  LL_DICE_GAIN: 0.5
  DET_TASK_WEIGHT: 1.0
  LANE_TASK_WEIGHT: 1.0

LANE:
  NUM_QUERIES: 10
  NUM_POINTS: 72
  NUM_TYPES: 7
  MAX_GT: 10
  D_MODEL: 256
  NHEAD: 8
  FFN_DIM: 1024
  DEC_LAYERS: 3
  DROPOUT: 0.0
  USE_TASK_ADAPTERS: true
  ADAPTER_HIDDEN_RATIO: 0.5
  EXIST_WEIGHT: 2.0
  PTS_WEIGHT: 5.0
  TYPE_WEIGHT: 1.0
  TANGENT_WEIGHT: 1.0
  CURVATURE_WEIGHT: 0.5
  OVERLAP_WEIGHT: 2.0
  VIS_WEIGHT: 0.5
  AUX_WEIGHT: 0.5
  RASTER_H: 72
  RASTER_W: 128
  RASTER_THICKNESS: 0.03
  DET_ONLY_EPOCHS: 3

DATASET:
  DATASET: 'BddDatasetPoints'
  CLASS_PROTOCOL: 'stage2_3c_extended'
  TRAIN_SET: 'train'
  TEST_SET: 'val'
  DATA_FORMAT: 'jpg'
  ORG_IMG_SIZE: [720, 1280]
  FLIP: true
  SCALE_FACTOR: 0.25
  ROT_FACTOR: 0
  TRANSLATE: 0.0
  SHEAR: 0.0
  COLOR_RGB: false
  HSV_H: 0.015
  HSV_S: 0.7
  HSV_V: 0.4
  MOSAIC: false        # geometry-sensitive lane polyline path
  MIXUP: false
  LANE_JSON_TRAIN: ''
  LANE_JSON_VAL: ''

TRAIN:
  OPTIMIZER: 'sgd'
  LR0: 0.01
  LRF: 0.2
  MOMENTUM: 0.937
  WD: 0.005
  NESTEROV: true
  WARMUP_EPOCHS: 3.0
  WARMUP_BIASE_LR: 0.1
  WARMUP_MOMENTUM: 0.8
  GAMMA1: 0.99
  GAMMA2: 0.0
  BEGIN_EPOCH: 0
  END_EPOCH: 100
  SGDR: true
  SGDR_T0: 50
  SGDR_TMULT: 1
  VAL_FREQ: 1
  BATCH_SIZE_PER_GPU: 12
  SHUFFLE: true
  IOU_THRESHOLD: 0.2
  ANCHOR_THRESHOLD: 4.0
  PLOT: true
  GRAD_CLIP_NORM: 10.0

TEST:
  BATCH_SIZE_PER_GPU: 16
  MODEL_FILE: ''
  SAVE_JSON: false
  SAVE_TXT: false
  PLOTS: true
  NMS_CONF_THRESHOLD: 0.001
  NMS_IOU_THRESHOLD: 0.6
  IMAGE_SIZE: [640, 384]
