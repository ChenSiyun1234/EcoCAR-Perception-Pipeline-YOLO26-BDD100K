# Joint Training Configuration — YOLO26 Detection + Lane Segmentation
# Used by: 08_joint_training.ipynb

# ── Paths ──────────────────────────────────────────────────────────────────
ecocar_root: /content/drive/MyDrive/EcoCAR
dataset_root: /content/drive/MyDrive/EcoCAR/datasets/bdd100k_yolo

# Dataset directories (relative to dataset_root)
train_images: images/train
train_labels: labels/train
train_masks: masks/train
val_images: images/val
val_labels: labels/val
val_masks: masks/val

# ── Detection classes ─────────────────────────────────────────────────────
nc: 10
names:
  0: person
  1: rider
  2: car
  3: truck
  4: bus
  5: train
  6: motorcycle
  7: bicycle
  8: traffic light
  9: traffic sign

# ── Model ─────────────────────────────────────────────────────────────────
pretrained_weights: yolo26s.pt
lane_hidden_channels: 64
mask_height: 180
mask_width: 320

# ── Training ──────────────────────────────────────────────────────────────
epochs: 10
batch_size: 8
img_size: 640
lr: 0.001
weight_decay: 0.0001

# Loss weights (α·det + β·lane)
det_loss_weight: 1.0
lane_loss_weight: 0.5

# ── Performance ───────────────────────────────────────────────────────────
amp: true              # Mixed precision (recommended for T4)
num_workers: 4
save_period: 5         # Save checkpoint every N epochs

# ── Output ────────────────────────────────────────────────────────────────
save_dir: /content/drive/MyDrive/EcoCAR/training_runs/joint_det_lane
